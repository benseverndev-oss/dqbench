name: Leaderboard
on:
  push:
    branches: [main]
    paths:
      - 'leaderboard/**'
      - 'LEADERBOARD.md'
      - 'dqbench/submission.py'
      - '.github/workflows/leaderboard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'leaderboard/**'
      - 'LEADERBOARD.md'
      - 'dqbench/submission.py'
      - '.github/workflows/leaderboard.yml'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Validate submissions and verify LEADERBOARD.md is current
        run: dqbench publish --check
